<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peidruski Archives</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:url("cat-menu.jpg") no-repeat center center/cover;
    height:100vh;
}

/* fundo escuro leve */
.overlay{
    background:rgba(0,0,0,0.55);
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* titulo */
h1{
    color:white;
    margin-top:80px;
    font-size:40px;
}

/* menu */
.menu{
    margin-top:60px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.menu a{
    text-decoration:none;
    background:#111;
    color:white;
    padding:15px 40px;
    border-radius:10px;
    font-size:20px;
    transition:0.2s;
    text-align:center;
}

.menu a:hover{
    background:#333;
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="overlay">

<h1>📁 Peidruski Archives</h1>

<div class="menu">

<a href="#">Home</a>
<a href="#">Downloads</a>
<a href="#">Arquivos</a>
<a href="#">Sobre</a>

</div>

</div>

</body>
</html>
